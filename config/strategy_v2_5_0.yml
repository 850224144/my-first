# v2.5.0 策略参数
# 原则：硬门槛防大错，评分负责分强弱，极弱才过滤。

final_signal:
  enable_final_buy_change: true

  daily_watch_score: 70
  daily_near_score: 75
  daily_buy_score: 80
  daily_strong_score: 85

  max_risk_pct: 8
  strong_max_risk_pct: 6
  max_price_distance_from_trigger_pct: 3

  weekly_hard_reject_score: 45
  weekly_buy_score: 55
  weekly_strong_score: 70

  sector_hard_reject_score: 45
  sector_buy_score: 55
  sector_strong_score: 70

  leader_reject_score: 50
  leader_buy_score: 60
  leader_strong_score: 70

  yuanjun_reject_score: 50
  yuanjun_buy_score: 55
  yuanjun_strong_score: 80
  rescue_candle_strong_score: 75

  hard_reject_flags:
    - market_risk_off
    - quote_not_fresh
    - risk_pct_too_high
    - daily_2buy_broken
    - pullback_new_low
    - leader_follower
    - no_sector_follow
    - divergence_count_too_many
    - weekly_downtrend_hard
    - no_breakout
    - too_hot_today
    - already_holding
    - already_paper_holding
    - in_cooldown

  downgrade_flags:
    - volume_not_confirm
    - weekly_neutral
    - sector_neutral
    - yuanjun_neutral
    - high_position_yuanjun

open_recheck:
  open_recheck_time: "09:26"
  open_confirm_time: "09:30"
  max_open_chase_pct: 3
  open_confirm_drop_tolerance_pct: 0.5
  require_open_above_yj_mid: true
  require_fresh_quote: true
  write_paper_trade_on_confirm: true

paper_trade:
  default_time_stop_trading_days: 5
  entry_types:
    - close_tail
    - next_open
  buy_statuses:
    - BUY_TRIGGERED
    - STRONG_BUY_TRIGGERED
    - OPEN_BUY_TRIGGERED

notify:
  dedupe_by_status_change: true
  channels:
    - wecom
