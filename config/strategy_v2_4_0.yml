# v2.4.0 策略参数
# 原则：门槛防大错，评分分强弱，降级防过拟合。

unit_standard:
  volume: "手"
  amount: "元"
  market_cap: "元"
  percent_format: "百分比数值，例如 5.2 表示 5.2%"

daily_2buy:
  observe_min_score: 70
  near_trigger_min_score: 75
  buy_min_score: 80
  strong_buy_min_score: 85

risk:
  max_risk_pct: 8
  strong_max_risk_pct: 6
  max_chase_pct_from_trigger: 3

weekly:
  strong_score: 70
  normal_score: 55
  hard_reject_score: 45
  too_hot_distance_from_ma20_pct: 35

sector:
  strong_score: 75
  normal_score: 55
  hard_reject_score: 45
  leader_buy_min_score: 60
  leader_reject_score: 50

yuanjun:
  strong_score: 80
  normal_score: 55
  reject_score: 50
  only_first_divergence: true
  max_divergence_count: 1
  high_position_gain_pct: 100
  high_position_no_strong_buy: true
  min_sector_follow_limit_up_count: 3
  strong_sector_follow_limit_up_count: 5
  rescue_volume_ratio_min: 1.5
  strong_rescue_volume_ratio_min: 2.0
  rescue_gain_pct_min: 3
  strong_rescue_gain_pct_min: 5

signal:
  # v2.4.0 只生成观察态，不强改 paper trading。
  enable_final_buy_change: false
  hard_reject_flags:
    - market_risk_off
    - quote_not_fresh
    - risk_pct_too_high
    - daily_2buy_broken
    - pullback_new_low
    - leader_follower
    - no_sector_follow
    - divergence_count_too_many
    - weekly_downtrend_hard
